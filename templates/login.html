<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome back to your dashboard, signup to continue..</title>
    <link rel="stylesheet" href="../static/styles/auth.css">
    <link rel="stylesheet" href="../static/styles/root.css">
    <link rel="stylesheet" href="../static/styles/fonts.css">
    <link rel="stylesheet" href="../static/assets/icons/regular-icon-font-free/lineicons.css">
    <link rel="stylesheet" href="../static/assets/icons/fontawesome-free-6.5.2-web/css/all.min.css">
</head>
<body>
    <div class="signup_container">
        <div class="signup_row">
            <div class="auth_image">
                <img src="./static/assets/images/4814337043efc982173ec5fdeeb0965e.jpg" alt="">
            </div>
            <div class="auth_body">
                <div class="logo">Uni<span>Center</span></div>
                <h1>Welcome Back!</h1>
                <p>We're glad to see you again! Sign in to access your dashboard and manage your account.</p>
            </div>
            <div class="auth_footer">
                <p><span class="fa-regular fa-copyright"></span>2026 Uniform Center. All rights reserved.</p>
            </div>
        </div>
        <div class="signup_row">
            <div class="form_container">
                <div class="logo">Uni<span>Center</span></div>
                <h2>Login to your account</h2>
                <p>Enter your credentials to access the dashboard.</p>
                <form action="#">
                    <div class="form-grid" style="grid-template-columns: 1fr;">
                        <div class="form-group">
                            <label for="phone">Enter email</label>
                            <input type="text" placeholder="Email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-container">
                                <input class="password" type="password" placeholder="Enter password">
                                <span class="password-toggle fa fa-eye" id="togglePassword"></span>
                            </div>
                        </div>
                    </div>
                    <a href="./dashboard.html">Login</a>
                    <!-- <button type="submit">Register Now</button> -->
                    <div class="redirectory">
                        <p>Don't have an account? <a href="../index.html">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="../static/scripts/pass_toggle.js"></script>
</body>
</html>
